name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Radar.sln

      # Directory.Build.props sets TreatWarningsAsErrors=true, so warnings fail the build.
      - name: Build
        run: dotnet build Radar.sln -c Release --no-restore

      - name: Test
        run: dotnet test Radar.sln -c Release --no-build --verbosity normal
